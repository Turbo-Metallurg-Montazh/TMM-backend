<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        h1 {
            color: #2c3e50;
            margin-top: 0;
        }
        .button {
            display: inline-block;
            padding: 12px 30px;
            background-color: #3498db;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            margin: 20px 0;
            font-weight: bold;
        }
        .button:hover {
            background-color: #2980b9;
        }
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            font-size: 12px;
            color: #777;
        }
    </style>
    <title></title>
</head>
<body>
<div class="container">
    <h1>Сброс пароля</h1>
    <p>Здравствуйте, {{USERNAME}}.</p>
    <p>Для сброса пароля нажмите кнопку ниже:</p>

    <p style="text-align: center;">
        <a href="{{RESET_URL}}" class="button">Сбросить пароль</a>
    </p>

    <p>Если вы не запрашивали сброс пароля, проигнорируйте это письмо.</p>

    <div class="footer">
        <p>Ссылка действует ограниченное время.</p>
        <p>Это автоматическое письмо, пожалуйста, не отвечайте на него.</p>
    </div>
</div>
</body>
</html>
