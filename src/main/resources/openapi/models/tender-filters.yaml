components:
  schemas:
    AddTenderFilterRequest:
      type: object
      properties:
        name:
          type: string
          description: Название фильтра
        active:
          type: boolean
          default: true
          description: Признак активности фильтра
        text:
          type: array
          items:
            type: string
          description: Ключевые слова
        exclude:
          type: array
          items:
            type: string
          description: Исключения
        categories:
          type: array
          items:
            type: integer
            format: int32
          description: Отрасль (deprecated во внешнем API)
          deprecated: true
        includeInns:
          type: array
          items:
            type: string
          description: Заказчики для включения
        excludeInns:
          type: array
          items:
            type: string
          description: Заказчики для исключения
        dateTimeFrom:
          type: string
          format: date-time
          description: Опубликовано с. Может быть null.
        dateTimeTo:
          type: string
          format: date-time
          description: Опубликовано до. Может быть null.
        participantsInns:
          type: array
          items:
            type: string
          description: ИНН участника/победителя/поставщика
        participantsState:
          type: integer
          format: int32
          description: Статус участника
        enableParticipantsFromDocuments:
          type: boolean
          description: Искать участников, найденных в документации
        regionIds:
          type: array
          items:
            type: string
            format: uuid
          description: Регионы
        purchaseStatuses:
          type: array
          items:
            type: integer
            format: int32
          description: Этапы закупки
        laws:
          type: array
          items:
            type: integer
            format: int32
          description: Типы торгов
        procedures:
          type: array
          items:
            type: integer
            format: int32
          description: Способы отбора
        electronicPlaces:
          type: array
          items:
            type: integer
            format: int32
          description: Электронные площадки
        categoryIds:
          type: array
          items:
            type: integer
            format: int32
          description: Идентификаторы отраслей
        strictSearch:
          type: boolean
          description: Точный поиск
        attachments:
          type: boolean
          description: Поиск по документам
        maxPriceFrom:
          type: integer
          format: int64
          description: Начальная цена от
        maxPriceTo:
          type: integer
          format: int64
          description: Начальная цена до
        maxPriceNone:
          type: boolean
          description: Включать закупки без НМЦ
        advance44:
          type: boolean
          description: Аванс по 44-ФЗ
        advance223:
          type: boolean
          description: Аванс по 223-ФЗ
        nonAdvance:
          type: boolean
          description: Без аванса для остальных типов торгов
        smp:
          type: integer
          format: int32
          description: Признак СМП
        allowForeignCurrency:
          type: boolean
          description: Разрешить иностранную валюту
        pageNumber:
          type: integer
          format: int32
          description: Номер страницы
        sortOrder:
          type: integer
          format: int32
          description: Порядок сортировки из веб-фильтра Контур.Закупок
        applicationDeadlineFrom:
          type: string
          format: date-time
          description: Срок подачи заявок с
        applicationDeadlineTo:
          type: string
          format: date-time
          description: Срок подачи заявок до
        applicationDeadlineType:
          type: string
          description: Тип фильтра по сроку подачи заявок из веб-версии
        includedRequirementIds:
          type: array
          items:
            type: integer
            format: int32
          description: Идентификаторы включенных требований
        excludedRequirementIds:
          type: array
          items:
            type: integer
            format: int32
          description: Идентификаторы исключенных требований
      required:
        - name

    ParseTenderFilterRequest:
      type: object
      properties:
        name:
          type: string
          description: Название фильтра. Если пустое, будет сгенерировано автоматически.
        filter:
          type: string
          description: Полная ссылка или query-строка фильтра из веб-версии Контур.Закупок
      required:
        - filter

    ParseTenderFilterResponse:
      type: object
      properties:
        name:
          type: string
          description: Итоговое сохраненное название фильтра
      required:
        - name

    ExportTendersByFilterRequest:
      type: object
      properties:
        filterName:
          type: string
          description: Уникальное название фильтра
        dateFrom:
          type: string
          format: date-time
          description: Переопределение даты начала выгрузки
        dateTo:
          type: string
          format: date-time
          description: Переопределение даты окончания выгрузки
        loadAllPages:
          type: boolean
          default: false
          description: Загружать все страницы до лимита 20
      required:
        - filterName

    ExportTendersByFilterResponse:
      type: object
      properties:
        filterName:
          type: string
        fromDate:
          type: string
          format: date-time
        toDate:
          type: string
          format: date-time
        tendersDownloadCount:
          type: integer
          format: int32
        totalPagesCount:
          type: integer
          format: int32
        loadedPagesCount:
          type: integer
          format: int32
        foundTenders:
          $ref: "#/components/schemas/FoundTendersResponse"

    FoundTendersResponse:
      type: object
      properties:
        totalCount:
          type: integer
          format: int32
        items:
          type: array
          items:
            $ref: "#/components/schemas/FoundTenderResponse"

    FoundTenderResponse:
      type: object
      properties:
        id:
          type: string
        notificationNumber:
          type: string
        orderName:
          type: string
        notificationTypeDesc:
          type: string
        typeOfTrading:
          type: integer
          format: int32
        maxPrice:
          type: number
          format: double
        currency:
          type: string
        epUri:
          type: string
        link:
          type: string
        applicationDeadline:
          type: string
          format: date-time
        isCancelled:
          type: boolean
        createDate:
          type: string
          format: date-time
        deliveryPlaces:
          type: array
          items:
            type: string
        inns:
          type: array
          items:
            type: string
        participants:
          type: array
          items:
            $ref: "#/components/schemas/FoundTenderParticipantResponse"
        otherInformation:
          type: string
        commissionDeadline:
          type: string
          format: date-time
        isAbandoned:
          type: boolean
        isPlanning:
          type: boolean

    FoundTenderParticipantResponse:
      type: object
      properties:
        inn:
          type: string
        isWinner:
          type: boolean
        isContractor:
          type: boolean
        foundFromDocuments:
          type: boolean

    TenderFilterSummaryResponse:
      type: object
      properties:
        name:
          type: string
        active:
          type: boolean

    TenderFilterDetailsResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        userId:
          type: integer
          format: int64
        active:
          type: boolean
        text:
          type: array
          items:
            type: string
        exclude:
          type: array
          items:
            type: string
        categories:
          type: array
          items:
            type: integer
            format: int32
        includeInns:
          type: array
          items:
            type: string
        excludeInns:
          type: array
          items:
            type: string
        dateTimeFrom:
          type: string
          format: date-time
        dateTimeTo:
          type: string
          format: date-time
        participantsInns:
          type: array
          items:
            type: string
        participantsState:
          type: integer
          format: int32
        enableParticipantsFromDocuments:
          type: boolean
        regionIds:
          type: array
          items:
            type: string
            format: uuid
        purchaseStatuses:
          type: array
          items:
            type: integer
            format: int32
        laws:
          type: array
          items:
            type: integer
            format: int32
        procedures:
          type: array
          items:
            type: integer
            format: int32
        electronicPlaces:
          type: array
          items:
            type: integer
            format: int32
        categoryIds:
          type: array
          items:
            type: integer
            format: int32
        strictSearch:
          type: boolean
        attachments:
          type: boolean
        maxPriceFrom:
          type: integer
          format: int64
        maxPriceTo:
          type: integer
          format: int64
        maxPriceNone:
          type: boolean
        advance44:
          type: boolean
        advance223:
          type: boolean
        nonAdvance:
          type: boolean
        smp:
          type: integer
          format: int32
        allowForeignCurrency:
          type: boolean
        pageNumber:
          type: integer
          format: int32
        sortOrder:
          type: integer
          format: int32
        applicationDeadlineFrom:
          type: string
          format: date-time
        applicationDeadlineTo:
          type: string
          format: date-time
        applicationDeadlineType:
          type: string
        includedRequirementIds:
          type: array
          items:
            type: integer
            format: int32
        excludedRequirementIds:
          type: array
          items:
            type: integer
            format: int32
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
